services:
  - type: web
    name: ldpe-glm-parameter-site
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: ZHIPU_MODEL
        value: glm-4-flash-250414
      - key: ENABLE_WEB_FALLBACK
        value: "true"
      - key: LOCAL_MIN_SAMPLES
        value: "3"
      - key: LOCAL_MATCH_SCORE_THRESHOLD
        value: "5.5"
      - key: SECRET_KEY
        generateValue: true
      - key: ZHIPU_API_KEY
        sync: false
      - key: ADMIN_UPLOAD_TOKEN
        sync: false
